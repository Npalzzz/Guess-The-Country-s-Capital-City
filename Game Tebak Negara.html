<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebak Negara Berdasarkan Ibukota</title>
    
    <style>
      
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f8ff; /* Warna latar belakang */
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #007bff;
            margin-bottom: 20px;
        }

        #capital-display {
            font-size: 2em;
            color: #333;
            margin: 15px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 10px;
            margin-top: 20px;
        }

        .option-button {
            padding: 15px;
            background-color: #e9ecef;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.2s;
        }

        .option-button:hover {
            background-color: #cfd8e3;
        }

        
        .correct {
            background-color: #28a745;
            color: white;
        }

        .wrong {
            background-color: #dc3545; 
            color: white;
        }

        #feedback {
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.2em;
            min-height: 30px; 
        }

        #next-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }
      
    </style>
</head>
<body>

    <div class="container">
        <h1>🌎 Tebak Negara (Ibukota)</h1>
        <div id="question-area">
            <p>Ibukota dari negara mana yang bernama:</p>
            <h2 id="capital-display"></h2>
        </div>
        
        <div id="options-container" class="options-grid">
            </div>

        <p id="feedback"></p>
        
        <button id="next-button" class="hidden">Lanjut</button>
    </div>
    
    <script>
      
        const countries = [
            { country: "Indonesia", capital: "Jakarta" },
            { country: "Malaysia", capital: "Kuala Lumpur" },
            { country: "Thailand", capital: "Bangkok" },
            { country: "Vietnam", capital: "Hanoi" },
            { country: "Singapura", capital: "Singapura" },
            { country: "Filipina", capital: "Manila" },
            { country: "Jepang", capital: "Tokyo" },
            { country: "Korea Selatan", capital: "Seoul" },
            { country: "India", capital: "New Delhi" },
            { country: "Prancis", capital: "Paris" },
            { country: "Jerman", capital: "Berlin" },
            { country: "Inggris", capital: "London" }
        ];

        // Elemen DOM
        const capitalDisplay = document.getElementById('capital-display');
        const optionsContainer = document.getElementById('options-container');
        const feedbackElement = document.getElementById('feedback');
        const nextButton = document.getElementById('next-button');

        let currentQuestion = null;
        let answered = false;

      
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

      
        function getNewQuestion() {
         
            const shuffledCountries = shuffleArray([...countries]);

          
            const correctAnswer = shuffledCountries[0];
            currentQuestion = correctAnswer;

           
            const incorrectAnswers = shuffledCountries.slice(1, 4).map(c => c.country);

        
            const options = shuffleArray([correctAnswer.country, ...incorrectAnswers]);

            return {
                capital: correctAnswer.capital,
                correctCountry: correctAnswer.country,
                options: options
            };
        }

        
        function displayQuestion() {
            const data = getNewQuestion();
            
           
            capitalDisplay.textContent = data.capital;
            
         
            optionsContainer.innerHTML = '';
            
        
            feedbackElement.textContent = '';
            nextButton.classList.add('hidden');
            answered = false;

          
            data.options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.classList.add('option-button');
                button.addEventListener('click', () => checkAnswer(button, option, data.correctCountry));
                optionsContainer.appendChild(button);
            });
        }

    
        function checkAnswer(clickedButton, selectedCountry, correctCountry) {
            
            if (answered) return;
            answered = true;

          
            Array.from(optionsContainer.children).forEach(btn => {
                btn.disabled = true;
            });

            if (selectedCountry === correctCountry) {
                feedbackElement.textContent = '✅ Benar! Itu adalah ibukota ' + correctCountry + '.';
                clickedButton.classList.add('correct');
            } else {
                feedbackElement.textContent = '❌ Salah. Jawaban yang benar adalah ' + correctCountry + '.';
                clickedButton.classList.add('wrong');

               
                Array.from(optionsContainer.children).forEach(btn => {
                    if (btn.textContent === correctCountry) {
                        btn.classList.add('correct');
                    }
                });
            }

         
            nextButton.classList.remove('hidden');
        }

       
        nextButton.addEventListener('click', displayQuestion);

        
        displayQuestion();
        
    </script>
</body>
</html>
