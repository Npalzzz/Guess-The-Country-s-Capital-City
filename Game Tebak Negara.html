<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tebak Negara Berdasarkan Ibukota</title>
    
    <style>
        /* --- KODE CSS --- */
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f8ff; /* Warna latar belakang */
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #007bff;
            margin-bottom: 20px;
        }

        #capital-display {
            font-size: 2em;
            color: #333;
            margin: 15px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 kolom */
            gap: 10px;
            margin-top: 20px;
        }

        .option-button {
            padding: 15px;
            background-color: #e9ecef;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.2s;
        }

        .option-button:hover {
            background-color: #cfd8e3;
        }

        /* Kelas untuk Umpan Balik (Feedback) */
        .correct {
            background-color: #28a745; /* Hijau */
            color: white;
        }

        .wrong {
            background-color: #dc3545; /* Merah */
            color: white;
        }

        #feedback {
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.2em;
            min-height: 30px; /* Agar tidak terjadi pergeseran saat teks muncul */
        }

        #next-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }
        /* --- AKHIR KODE CSS --- */
    </style>
</head>
<body>

    <div class="container">
        <h1>🌎 Tebak Negara (Ibukota)</h1>
        <div id="question-area">
            <p>Ibukota dari negara mana yang bernama:</p>
            <h2 id="capital-display"></h2>
        </div>
        
        <div id="options-container" class="options-grid">
            </div>

        <p id="feedback"></p>
        
        <button id="next-button" class="hidden">Lanjut</button>
    </div>
    
    <script>
        /* --- KODE JAVASCRIPT --- */
        // Data pasangan Negara dan Ibukota
        const countries = [
            { country: "Indonesia", capital: "Jakarta" },
            { country: "Malaysia", capital: "Kuala Lumpur" },
            { country: "Thailand", capital: "Bangkok" },
            { country: "Vietnam", capital: "Hanoi" },
            { country: "Singapura", capital: "Singapura" },
            { country: "Filipina", capital: "Manila" },
            { country: "Jepang", capital: "Tokyo" },
            { country: "Korea Selatan", capital: "Seoul" },
            { country: "India", capital: "New Delhi" },
            { country: "Prancis", capital: "Paris" },
            { country: "Jerman", capital: "Berlin" },
            { country: "Inggris", capital: "London" }
        ];

        // Elemen DOM
        const capitalDisplay = document.getElementById('capital-display');
        const optionsContainer = document.getElementById('options-container');
        const feedbackElement = document.getElementById('feedback');
        const nextButton = document.getElementById('next-button');

        let currentQuestion = null;
        let answered = false;

        // Fungsi untuk mengacak array (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Fungsi untuk mendapatkan pertanyaan baru
        function getNewQuestion() {
            // 1. Acak semua negara
            const shuffledCountries = shuffleArray([...countries]);

            // 2. Pilih negara pertama sebagai Jawaban Benar
            const correctAnswer = shuffledCountries[0];
            currentQuestion = correctAnswer;

            // 3. Ambil 3 negara lainnya sebagai Jawaban Salah
            const incorrectAnswers = shuffledCountries.slice(1, 4).map(c => c.country);

            // 4. Gabungkan dan acak semua pilihan jawaban
            const options = shuffleArray([correctAnswer.country, ...incorrectAnswers]);

            return {
                capital: correctAnswer.capital,
                correctCountry: correctAnswer.country,
                options: options
            };
        }

        // Fungsi untuk menampilkan pertanyaan ke layar
        function displayQuestion() {
            const data = getNewQuestion();
            
            // Tampilkan Ibukota
            capitalDisplay.textContent = data.capital;
            
            // Reset kontainer pilihan jawaban
            optionsContainer.innerHTML = '';
            
            // Reset status dan tombol
            feedbackElement.textContent = '';
            nextButton.classList.add('hidden');
            answered = false;

            // Buat tombol untuk setiap pilihan
            data.options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.classList.add('option-button');
                button.addEventListener('click', () => checkAnswer(button, option, data.correctCountry));
                optionsContainer.appendChild(button);
            });
        }

        // Fungsi untuk memeriksa jawaban
        function checkAnswer(clickedButton, selectedCountry, correctCountry) {
            // Hanya izinkan 1 jawaban per pertanyaan
            if (answered) return;
            answered = true;

            // Nonaktifkan semua tombol setelah menjawab
            Array.from(optionsContainer.children).forEach(btn => {
                btn.disabled = true;
            });

            if (selectedCountry === correctCountry) {
                feedbackElement.textContent = '✅ Benar! Itu adalah ibukota ' + correctCountry + '.';
                clickedButton.classList.add('correct');
            } else {
                feedbackElement.textContent = '❌ Salah. Jawaban yang benar adalah ' + correctCountry + '.';
                clickedButton.classList.add('wrong');

                // Tandai jawaban yang benar dengan warna hijau
                Array.from(optionsContainer.children).forEach(btn => {
                    if (btn.textContent === correctCountry) {
                        btn.classList.add('correct');
                    }
                });
            }

            // Tampilkan tombol Lanjut
            nextButton.classList.remove('hidden');
        }

        // Event listener untuk tombol "Lanjut"
        nextButton.addEventListener('click', displayQuestion);

        // Inisialisasi game saat halaman dimuat
        displayQuestion();
        /* --- AKHIR KODE JAVASCRIPT --- */
    </script>
</body>
</html>
